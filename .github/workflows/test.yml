name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18, 20, 22]

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Install dependencies
        run: npm ci

      - name: Run SDK tests
        run: node --test packages/vaultify/__tests__/client.test.js packages/vaultify/__tests__/stream.test.js

      - name: Verify SDK package
        run: cd packages/vaultify && npm pack --dry-run

      - name: Verify CLI package
        run: cd apps/cli && npm pack --dry-run
